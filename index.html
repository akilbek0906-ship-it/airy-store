<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirySkin Store</title>
    <!-- Подключаем скрипт Телеграма, чтобы сайт мог общаться с ботом -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: white;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        h1 { color: #3897f0; }
        .product-card {
            background-color: #262626;
            border-radius: 10px;
            padding: 15px;
            margin: 15px auto;
            max-width: 300px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .price { color: #4cd964; font-weight: bold; font-size: 1.2em; margin: 10px 0; }
        .btn {
            background-color: #007aff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 1em;
            font-weight: bold;
        }
        .btn:hover { background-color: #0063cc; }
    </style>
</head>
<body>

    <h1>AirySkin Store</h1>

    <div class="product-card">
        <h3>Товар 1 (например, Одежда)</h3>
        <div class="price">5000 ₸</div>
        <button class="btn" onclick="sendOrder('Товар 1', '5000')">Купить</button>
    </div>

    <div class="product-card">
        <h3>Товар 2 (например, Текстиль)</h3>
        <div class="price">8500 ₸</div>
        <button class="btn" onclick="sendOrder('Товар 2', '8500')">Купить</button>
    </div>

    <script>
        // Инициализируем WebApp Телеграма
        const tg = window.Telegram.WebApp;
        tg.ready(); // Говорим ТГ, что приложение загрузилось

        function sendOrder(productName, price) {
            // Создаем объект с данными заказа
            const data = {
                product: productName,
                price: price
            };
            
            // Отправляем данные в бот (переводим объект в строку текста)
            tg.sendData(JSON.stringify(data));
            
            // Закрываем мини-апп после клика
            tg.close();
        }
    </script>
</body>
</html>
