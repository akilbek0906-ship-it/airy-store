<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirySkin Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: white;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        h1 { color: #3897f0; }
        .product-card {
            background-color: #262626;
            border-radius: 10px;
            padding: 15px;
            margin: 15px auto;
            max-width: 300px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .price { color: #4cd964; font-weight: bold; font-size: 1.2em; margin: 10px 0; }
        .btn {
            background-color: #007aff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 1em;
            font-weight: bold;
        }
        .btn:hover { background-color: #0063cc; }
        .btn:disabled { background-color: #444; cursor: not-allowed; }
    </style>
</head>
<body>

    <h1>AirySkin Store</h1>

    <!--
        Цены здесь показаны ТОЛЬКО для покупателя, чтобы он видел, что покупает.
        Реальная цена, которая пойдет в заказ, хранится на сервере (в bot.py),
        а не берётся из этой страницы. Так подделать сумму заказа нельзя.
    -->

    <div class="product-card">
        <h3>Футболка Airy Classic</h3>
        <div class="price">8500 ₸</div>
        <button class="btn" onclick="sendOrder('product_1')">Купить</button>
    </div>

    <div class="product-card">
        <h3>Худи Airy Skin Черное</h3>
        <div class="price">14500 ₸</div>
        <button class="btn" onclick="sendOrder('product_2')">Купить</button>
    </div>

    <div class="product-card">
        <h3>Кепка Airy Cap</h3>
        <div class="price">5500 ₸</div>
        <button class="btn" onclick="sendOrder('product_3')">Купить</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function sendOrder(productId) {
            const contact = prompt("Введите ваш Telegram ник или номер телефона:");
            if (!contact || !contact.trim()) return;

            const button = event.target;
            button.disabled = true;
            button.textContent = "Отправляем...";

            // Отправляем ТОЛЬКО id товара и контакт.
            // Никаких токенов и цен внутри этой страницы нет — и не должно быть.
            const data = {
                product_id: productId,
                contact: contact.trim()
            };

            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
