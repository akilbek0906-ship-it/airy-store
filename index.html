<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirySkin Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1c1c1e;
            color: #ffffff;
            margin: 0;
            padding: 15px;
            text-align: center;
        }
        h1 { font-size: 24px; margin-bottom: 20px; color: #007aff; }
        .container { display: flex; flex-direction: column; gap: 15px; }
        .product-card {
            background-color: #2c2c2e;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .product-title { font-size: 18px; font-weight: bold; margin-bottom: 8px; }
        .product-price { color: #34c759; font-size: 16px; margin-bottom: 12px; }
        .btn {
            background-color: #007aff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
        }
        .btn:active { background-color: #0056b3; }
    </style>
</head>
<body>

    <h1>AirySkin Store</h1>
    
    <div class="container">
        <div class="product-card">
            <div class="product-title">Товар 1 (например, Одежда)</div>
            <div class="product-price">5000 ₸</div>
            <button class="btn" onclick="buyProduct('Товар 1', 5000)">Купить</button>
        </div>

        <div class="product-card">
            <div class="product-title">Товар 2 (например, Текстиль)</div>
            <div class="product-price">8500 ₸</div>
            <button class="btn" onclick="buyProduct('Товар 2', 8500)">Купить</button>
        </div>
    </div>

    <script>
        // Инициализируем Телеграм Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); // Расширяем окно на весь экран телефона

        function buyProduct(name, price) {
            // При нажатии отправляем данные обратно в бота
            const data = JSON.stringify({ product: name, price: price });
            tg.sendData(data); 
            tg.close(); // Закрываем магазин после покупки
        }
    </script>
</body>
</html>
